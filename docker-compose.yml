version: '3.8'

services:
  # Relational Database for metrics, metadata and transcripts
  db:
    build:
      context: .
      dockerfile: infrastructure/docker/postgres.Dockerfile
    container_name: cvip-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-cognitive_voice_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server (FastAPI with Faster-Whisper pipeline)
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: cvip-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_here}@db:5432/${POSTGRES_DB:-cognitive_voice_db}
      - PROJECT_NAME=${PROJECT_NAME:-Cognitive Voice Intelligence Platform}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_CPU_THREADS=${WHISPER_CPU_THREADS:-4}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_uploads:/app/uploads
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  # Frontend Application (Next.js client)
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: cvip-frontend
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
